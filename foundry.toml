[profile.default]
src            = "contracts"
out            = "out"
libs           = ["lib"]
script         = "scripts"
solc_version   = "0.8.28"
via_ir         = true
optimizer      = true
optimizer_runs = 200
no_size_check  = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
    "core/=contracts-core/",
    "oracle/=contracts-oracle/",
]
